    <!-- makeshift styling for now -->
     <style>
        img {
            height: 300px;
            width: auto;
            padding: 20px 15px;
        }

        .books-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }

        .book-card {
            border: 1px solid #5b595c;
            border-radius: 8px;
            overflow: hidden;
            width: 200px;
            height: auto;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .book-card:hover {
            transform: translateY(-4px);
            border-color: #a9dc76;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .book-card a {
            display: block;
            width: 100%;
            height: 280px;
            overflow: hidden;
        }

        .book-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.2s;
        }
     </style>

    <!-- starter pdf grid -->
    <div class="books-grid">

        <div class="book-card">
            <a href="{% static 'python_crash_course.pdf' %}">
                <img src="{% static 'python_crash_course.jpeg' %}" alt="Python Crash Course">
            </a>
        </div>

        <div class="book-card">
            <a href="{% static 'psychology_of_money.pdf' %}">
                <img src="{% static 'psychology_of_money.jpg' %}" alt="image not found">
            </a>
        </div>

        <div class="book-card">
            <a href="{% static 'c_programming_language.pdf' %}">
                <img src="{% static 'c_programming_language.jpg' %}" alt="image not found">
            </a>
        </div>

    </div>

{% endblock page_header %}
