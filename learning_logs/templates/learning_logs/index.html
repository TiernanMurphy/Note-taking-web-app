{% extends "learning_logs/base.html" %}
{% load static %}

{% block page_header %}
<link rel="stylesheet" href="{% static 'learning_logs/css/styles.css' %}">
<!-- links look messy, but it's Django convention -->
<!-- grid of books -->
<p class="row-label">Python Programming</p>
<div class="books-grid">
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/python_crash_course.pdf' %}" target="_blank">
            <img src="{% static 'learning_logs/img/python_crash_course.jpeg' %}" alt="Python Crash Course">
        </a>
    </div>
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/python_for_data_analysis.pdf' %}" target="_blank">
            <img src="{% static 'learning_logs/img/python_for_data_analysis.jpg' %}" alt="Python for Data Analysis">
        </a>
    </div>
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/automate_python.pdf' %}" target="_blank">
            <img src="{% static 'learning_logs/img/automate_python.jpg' %}" alt="Automate the Boring Stuff with Python">
        </a>
    </div>
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/oreilly_ml_python.pdf' %}" target="_blank">
            <img src="{% static 'learning_logs/img/oreilly_ml_python.jpg' %}"
                alt="Introduction to Machine Learning with Python">
        </a>
    </div>
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/fluent_python.pdf' %}" target="_blank">
            <img src="{% static 'learning_logs/img/fluent_python.jpg' %}" alt="Fluent Python">

</div>

    <div class="book-card">
