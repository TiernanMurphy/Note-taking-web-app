{% extends "learning_logs/base.html" %}
{% load static %}

{% block page_header %}

{% if not user.is_authenticated %}

{% endif %}

<!-- grid of books -->
<p class="row-label">Python Programming</p>
<div class="books-grid">
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/python_crash_course.pdf' %}" target="_blank">
            <img src="{% static 'learning_logs/img/python_crash_course.jpeg' %}" alt="Python Crash Course">
        </a>
    </div>
    <div class="book-card">
        <a href="{% static 'learning_logs/pdfs/python_for_data_analysis.pdf' %}" target="_blank">

    <div class="book-card">

    </div>
    <div class="book-card">
