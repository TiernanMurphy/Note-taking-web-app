{% extends "learning_logs/base.html" %}

{% block content %}
<div class="container">
    <div class="alert alert-warning">
        <h4>Are you sure you want to delete "{{ topic.text }}"?</h4>
        <p class="text-muted">This can't be undone, and you'll lose all entries within the topic</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i class="fas fa-trash"></i> Yes
        </button>
        <a href="{% url 'learning_logs:topics' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
